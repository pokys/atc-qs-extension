name: Build Release Packages

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read manifest versions
        id: versions
        run: |
          set -euo pipefail
          firefox_version=$(sed -n 's/.*"version": "\(.*\)",/\1/p' firefox/manifest.json | head -n 1)
          chrome_version=$(sed -n 's/.*"version": "\(.*\)",/\1/p' chrome/manifest.json | head -n 1)
          echo "firefox_version=$firefox_version" >> "$GITHUB_OUTPUT"
          echo "chrome_version=$chrome_version" >> "$GITHUB_OUTPUT"

      - name: Build packages
        run: |
          set -euo pipefail
          mkdir -p dist/firefox dist/chrome
          cp shared/* dist/firefox/
          cp firefox/manifest.json dist/firefox/manifest.json
          cp shared/* dist/chrome/
          cp chrome/manifest.json dist/chrome/manifest.json
          (cd dist/firefox && zip -r "../atc-qs-extension-firefox-${{ steps.versions.outputs.firefox_version }}.zip" .)
          (cd dist/chrome && zip -r "../atc-qs-extension-chrome-${{ steps.versions.outputs.chrome_version }}.zip" .)

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ github.event.release.tag_name }}" \
            "dist/atc-qs-extension-firefox-${{ steps.versions.outputs.firefox_version }}.zip" \
            "dist/atc-qs-extension-chrome-${{ steps.versions.outputs.chrome_version }}.zip" \
            --clobber
